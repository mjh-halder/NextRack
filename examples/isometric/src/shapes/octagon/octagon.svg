<g
    highlighter-selector="base"
>
    <!-- Base octagon — 2D footprint and hit area -->
    <path @selector="base" @group-selector="common"
        :d="{{baseOctagonPath([size, cornerRadius])}}"
        fill="#e0e0e0"
        stroke="#333"
        stroke-linejoin="round"
    />

    <!-- ISO: front-facing side faces (light gray) — drawn first -->
    <polygon @selector="frontLeft" @group-selector="iso"
        :points="{{frontLeftPoints([size, isometricHeight, cornerRadius])}}"
        fill="#e0e0e0"
        stroke="#333"
        stroke-linejoin="round"
    />
    <polygon @selector="frontBottom" @group-selector="iso"
        :points="{{frontBottomPoints([size, isometricHeight, cornerRadius])}}"
        fill="#e0e0e0"
        stroke="#333"
        stroke-linejoin="round"
    />
    <polygon @selector="frontRight" @group-selector="iso"
        :points="{{frontRightPoints([size, isometricHeight, cornerRadius])}}"
        fill="#e0e0e0"
        stroke="#333"
        stroke-linejoin="round"
    />

    <!-- ISO: right-facing face (medium gray) — rendered over front faces -->
    <polygon @selector="side" @group-selector="iso"
        :points="{{rightFacePoints([size, isometricHeight, cornerRadius])}}"
        fill="#c6c6c6"
        stroke="#333"
        stroke-linejoin="round"
    />

    <!-- ISO: corner side panels — rendered before top face.
         V5, V4, V6 are front-facing; V3 is the right/front transition;
         V2 is right-facing. V7, V0, V1 (fully hidden) are not rendered. -->
    <path @selector="cornerV6" @group-selector="iso"
        :d="{{cornerV6Path([size, isometricHeight, cornerRadius])}}"
        fill="#e0e0e0"
        stroke="#333"
        stroke-linejoin="round"
    />
    <path @selector="cornerV5" @group-selector="iso"
        :d="{{cornerV5Path([size, isometricHeight, cornerRadius])}}"
        fill="#e0e0e0"
        stroke="#333"
        stroke-linejoin="round"
    />
    <path @selector="cornerV4" @group-selector="iso"
        :d="{{cornerV4Path([size, isometricHeight, cornerRadius])}}"
        fill="#e0e0e0"
        stroke="#333"
        stroke-linejoin="round"
    />
    <path @selector="cornerV3" @group-selector="iso"
        :d="{{cornerV3Path([size, isometricHeight, cornerRadius])}}"
        fill="#c6c6c6"
        stroke="#333"
        stroke-linejoin="round"
    />
    <path @selector="cornerV2" @group-selector="iso"
        :d="{{cornerV2Path([size, isometricHeight, cornerRadius])}}"
        fill="#c6c6c6"
        stroke="#333"
        stroke-linejoin="round"
    />

    <!-- ISO: top octagonal face — rendered last, on top of all side faces -->
    <path @selector="top" @group-selector="iso"
        :d="{{topOctagonPath([size, isometricHeight, cornerRadius])}}"
        fill="#a8a8a8"
        stroke="#333"
        stroke-linejoin="round"
    />

    <!-- ISO: icon image on the top face; position/size set via attr() -->
    <image @selector="topIcon" @group-selector="iso"
        href=""
        x="0" y="0" width="0" height="0"
        preserveAspectRatio="xMidYMid meet"
    />

    <!-- 2D: icon image centered in the shape bounding box; position/size set via attr() -->
    <image @selector="topIcon2D" @group-selector="2d"
        href=""
        x="0" y="0" width="0" height="0"
        preserveAspectRatio="xMidYMid meet"
    />

    <text @selector="label" @group-selector="common"
        text-anchor="left"
        text-vertical-anchor="middle"
        font-family="sans-serif"
        font-size="11"
        fill="#333"
        stroke="#fff"
        stroke-width="3"
        paint-order="stroke"
        y="calc(h + 10)"
        x="calc(w + 10)"
        text="Octagon"
    />
</g>
