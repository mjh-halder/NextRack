<g
    magnet-selector="base"
    highlighter-selector="base"
>

    <!-- Front face: octagon at (0,0), shown in both 2D and isometric views -->
    <polygon @selector="base" @group-selector="common"
        :points="{{baseOctagonPoints([size])}}"
        fill="#42be65"
        stroke="#333"
        stroke-linejoin="round"
    />

    <!-- Bottom-facing band: traces the lower visible faces of the octagonal prism -->
    <path @selector="front" @group-selector="iso"
        fill="#42be65"
        stroke="#333"
        stroke-linejoin="round"
        :d="{{frontPath([size, isometricHeight])}}"
    />

    <!-- Right-facing face: the right-flat rectangular face of the prism -->
    <path @selector="side" @group-selector="iso"
        fill="#24a148"
        stroke="#333"
        stroke-linejoin="round"
        :d="{{sidePath([size, isometricHeight])}}"
    />

    <!-- Top octagonal face, shifted by (-iH, -iH) -->
    <polygon @selector="top" @group-selector="iso"
        :points="{{topOctagonPoints([size, isometricHeight])}}"
        fill="#198038"
        stroke="#333"
        stroke-linejoin="round"
    />

    <image @selector="topImage" @group-selector="iso"
        xlink-href="assets/kubernetesWorkerNode-logo.svg"
        width="calc(w-4)"
        height="calc(h-4)"
        transform="translate(2,2)"
        :x="{{topXPosition([isometricHeight])}}"
        :y="{{topYPosition([isometricHeight])}}"
    />

    <image @selector="2DImage" @group-selector="2d"
        xlink-href="assets/kubernetesWorkerNode-logo.svg"
        x="2"
        y="2"
        width="calc(w - 4)"
        height="calc(h - 4)"
    />

    <text @selector="label" @group-selector="common"
        text-anchor="left"
        text-vertical-anchor="middle"
        font-family="sans-serif"
        font-size="11"
        fill="#333"
        stroke="#fff"
        stroke-width="3"
        paint-order="stroke"
        y="calc(h + 10)"
        x="calc(w + 10)"
        text="K8s Worker Node"
    />
</g>
