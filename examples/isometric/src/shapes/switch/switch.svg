<g
    magnet-selector="base"
    highlighter-selector="base"
>
    <!-- 2D footprint — hit area, magnet, and 2D view representation -->
    <path @selector="base" @group-selector="common"
        :d="{{baseCuboidPath([size, cornerRadius])}}"
        fill="#e0e0e0"
        stroke="#333"
        stroke-linejoin="round"
    />

    <!-- ISO: front face (bottom edge V2→V3) -->
    <path @selector="front" @group-selector="iso"
        fill="#e0e0e0"
        stroke="#333"
        stroke-linejoin="round"
        :d="{{cuboidFrontPath([size, isometricHeight, cornerRadius, chamferSize])}}"
    />

    <!-- ISO: side face (right edge V1→V2) -->
    <path @selector="side" @group-selector="iso"
        fill="#c6c6c6"
        stroke="#333"
        stroke-linejoin="round"
        :d="{{cuboidSidePath([size, isometricHeight, cornerRadius, chamferSize])}}"
    />

    <!-- ISO: corner strips — rendered before top face -->
    <path @selector="cornerV1" @group-selector="iso"
        fill="#c6c6c6"
        stroke="#333"
        stroke-linejoin="round"
        :d="{{cuboidCornerV1Path([size, isometricHeight, cornerRadius, chamferSize])}}"
    />
    <path @selector="cornerV2" @group-selector="iso"
        fill="#c6c6c6"
        stroke="#333"
        stroke-linejoin="round"
        :d="{{cuboidCornerV2Path([size, isometricHeight, cornerRadius, chamferSize])}}"
    />
    <path @selector="cornerV3" @group-selector="iso"
        fill="#e0e0e0"
        stroke="#333"
        stroke-linejoin="round"
        :d="{{cuboidCornerV3Path([size, isometricHeight, cornerRadius, chamferSize])}}"
    />

    <!-- ISO: top face — same footprint path shifted by (-iH, -iH) -->
    <path @selector="top" @group-selector="iso"
        fill="#a8a8a8"
        stroke="#333"
        stroke-linejoin="round"
        :d="{{topCuboidPath([size, isometricHeight, cornerRadius, chamferSize])}}"
    />

    <circle @selector="badge" @group-selector="iso"
        r="calc(0.32 * w)"
        fill="#009d9a"
        :cx="{{topCenterX([size, isometricHeight])}}"
        :cy="{{topCenterY([size, isometricHeight])}}"
    />

    <image @selector="topImage" @group-selector="iso"
        xlink-href="assets/switch-icon.svg"
        width="calc(w-4)"
        height="calc(h-4)"
        transform="translate(2,2)"
        :x="{{topXPosition([isometricHeight])}}"
        :y="{{topYPosition([isometricHeight])}}"
    />

    <circle @selector="badge2D" @group-selector="2d"
        cx="calc(0.5 * w)"
        cy="calc(0.5 * h)"
        r="calc(0.32 * w)"
        fill="#009d9a"
    />

    <image @selector="2DImage" @group-selector="2d"
        xlink-href="assets/switch-icon.svg"
        x="2"
        y="2"
        width="calc(w - 4)"
        height="calc(h - 4)"
    />

    <image @selector="topIcon" @group-selector="iso"
        href=""
        x="0" y="0" width="0" height="0"
        preserveAspectRatio="xMidYMid meet"
    />

    <image @selector="topIcon2D" @group-selector="2d"
        href=""
        x="0" y="0" width="0" height="0"
        preserveAspectRatio="xMidYMid meet"
    />

    <text @selector="label" @group-selector="common"
        text-anchor="left"
        text-vertical-anchor="middle"
        font-family="sans-serif"
        font-size="11"
        fill="#333"
        stroke="#fff"
        stroke-width="3"
        paint-order="stroke"
        y="calc(h + 10)"
        x="calc(w + 10)"
        text="Switch"
    />
</g>
