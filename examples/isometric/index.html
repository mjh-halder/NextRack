<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="The JointJS Isometric demo serves as a template to help bring your idea to life in no time."/>
    <title>Isometric Diagram | JointJS</title>
    <!-- Apply theme before first paint to avoid flash -->
    <script>
      (function(){
        var t = localStorage.getItem('nr-theme');
        document.documentElement.className = t === 'dark' ? 'cds--g100' : 'cds--white';
      })();
    </script>
  </head>
  <body>
    <div id="top-header" class="cds--g100" role="banner" aria-label="Application header"></div>
    <nav id="nav-rail" class="cds--g100" aria-label="Application navigation">
      <button id="nav-grid" class="nr-rail-item nr-rail-item--active" type="button"
              title="System Designer" aria-label="System Designer" aria-current="page">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
             width="20" height="20" aria-hidden="true">
          <path d="M1 1h8v8H1V1zm10 0h8v8h-8V1zM1 11h8v8H1v-8zm10 0h8v8h-8v-8z"/>
        </svg>
      </button>
      <button id="nav-shapes" class="nr-rail-item" type="button"
              title="Component Designer" aria-label="Component Designer">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
             width="20" height="20" aria-hidden="true">
          <path d="M10 1L19 10 10 19 1 10z"/>
        </svg>
      </button>
      <button id="nav-theme" class="nr-rail-item nr-rail-item--bottom" type="button"
              title="Switch to dark mode" aria-label="Switch to dark mode">
        <!-- Icon is set by JS on init; placeholder keeps the button sized correctly -->
      </button>
    </nav>
    <div id="palette"></div>
    <div id="design-name"></div>
    <div id="canvas"></div>
    <div id="view-toggle-container"></div>
    <div id="inspector"></div>
    <div id="component-designer" aria-hidden="true">
      <div id="cd2-palette"></div>
      <div id="cd2-design-name"></div>
      <div id="cd2-canvas-wrap">
        <div class="cd2-view-pane">
          <span class="cd2-pane-label">2D</span>
          <div id="cd2-canvas-2d"></div>
        </div>
        <div class="cd2-view-pane">
          <span class="cd2-pane-label">Isometric</span>
          <div id="cd2-canvas"></div>
        </div>
      </div>
      <div id="cd2-view-toggle-container"></div>
      <div id="cd2-inspector"></div>
    </div>
    <a rel="noopener" target="_blank" href="https://www.jointjs.com">
      <img alt="JointJS logo" id="logo" src="assets/jj-logo.svg" width="200" height="50"></img>
    </a>
    <script src="dist/bundle.js"></script>
  </body>
</html>
