<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="The JointJS Isometric demo serves as a template to help bring your idea to life in no time."/>
    <title>Xyronos</title>
    <!-- Apply theme before first paint to avoid flash -->
    <script>
      (function(){
        var t = localStorage.getItem('nr-theme');
        document.documentElement.className = t === 'dark' ? 'cds--g100' : 'cds--white';
      })();
    </script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=view_object_track&display=block"/>
    <style>
      #app-loader {
        all: initial;
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        z-index: 99999;
        background: #161616;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        transition: opacity 0.4s ease, visibility 0.4s ease;
        box-sizing: border-box;
      }
      #app-loader.fade-out {
        opacity: 0; visibility: hidden;
      }
      #app-loader .loader-brand {
        all: initial;
        display: flex; align-items: center; gap: 6px;
        margin-bottom: 32px;
        box-sizing: border-box;
      }
      #app-loader .loader-icon {
        all: initial;
        font-family: 'Material Symbols Outlined';
        font-size: 28px; color: #fff;
        font-weight: 400; font-style: normal;
        line-height: 28px; letter-spacing: normal;
        text-transform: none; direction: ltr;
        -webkit-font-smoothing: antialiased;
        display: block;
        width: 28px; height: 28px;
        overflow: hidden;
        box-sizing: border-box;
      }
      #app-loader .loader-name {
        all: initial;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 18px; font-weight: 600;
        line-height: 28px;
        color: #fff; letter-spacing: -0.01em;
        display: block;
        box-sizing: border-box;
      }
      #app-loader .loader-spinner {
        all: initial;
        display: block;
        width: 24px; height: 24px;
        border: 2px solid #333;
        border-top-color: #0f62fe;
        border-radius: 50%;
        animation: loader-spin 0.8s linear infinite;
        box-sizing: border-box;
      }
      @keyframes loader-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div class="loader-brand">
        <span class="loader-icon">view_object_track</span>
        <span class="loader-name">Xyronos</span>
      </div>
      <div class="loader-spinner"></div>
    </div>
    <div id="top-header" class="cds--g100" role="banner" aria-label="Application header"></div>
    <nav id="nav-rail" class="cds--g100" aria-label="Application navigation">
      <button id="nav-grid" class="nr-rail-item nr-rail-item--active" type="button"
              title="System Designer" aria-label="System Designer" aria-current="page">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="currentColor"
             width="20" height="20" aria-hidden="true">
          <path d="M16,24a.9967.9967,0,0,1-.4741-.12l-13-7L3.4741,15.12,16,21.8643,28.5259,15.12l.9482,1.7607-13,7A.9967.9967,0,0,1,16,24Z"/>
          <path d="M16,30a.9967.9967,0,0,1-.4741-.12l-13-7L3.4741,21.12,16,27.8643,28.5259,21.12l.9482,1.7607-13,7A.9967.9967,0,0,1,16,30Z"/>
          <path d="M16,18a.9967.9967,0,0,1-.4741-.12l-13-7a1,1,0,0,1,0-1.7607l13-7a.9982.9982,0,0,1,.9482,0l13,7a1,1,0,0,1,0,1.7607l-13,7A.9967.9967,0,0,1,16,18ZM5.1094,10,16,15.8643,26.8906,10,16,4.1358Z"/>
        </svg>
      </button>
      <button id="nav-shapes" class="nr-rail-item" type="button"
              title="Component Designer" aria-label="Component Designer">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="currentColor"
             width="20" height="20" aria-hidden="true">
          <path d="M28.5039,8.1362l-12-7a1,1,0,0,0-1.0078,0l-12,7A1,1,0,0,0,3,9V23a1,1,0,0,0,.4961.8638l12,7a1,1,0,0,0,1.0078,0l12-7A1,1,0,0,0,29,23V9A1,1,0,0,0,28.5039,8.1362ZM16,3.1577,26.0156,9,16,14.8423,5.9844,9ZM5,10.7412l10,5.833V28.2588L5,22.4258ZM17,28.2588V16.5742l10-5.833V22.4258Z"/>
        </svg>
      </button>
      <button id="nav-apps" class="nr-rail-item" type="button"
              title="Applications" aria-label="Applications">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="currentColor"
             width="20" height="20" aria-hidden="true">
          <path d="M28 10H20V4a2 2 0 00-2-2H6a2 2 0 00-2 2V28a2 2 0 002 2H28a2 2 0 002-2V12A2 2 0 0028 10ZM6 4H18V28H6ZM28 28H20V12h8Z"/>
        </svg>
      </button>
      <button id="nav-catalog" class="nr-rail-item" type="button"
              title="Product Catalog" aria-label="Product Catalog">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="currentColor"
             width="20" height="20" aria-hidden="true">
          <path d="M26 2H8a2 2 0 0 0-2 2v4H4v2h2v5H4v2h2v5H4v2h2v4a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm0 26H8v-4h2v-2H8v-5h2v-2H8v-5h2V8H8V4h18z"/>
        </svg>
      </button>
      <button id="nav-docs" class="nr-rail-item" type="button"
              title="Knowledge Base" aria-label="Knowledge Base">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="currentColor"
             width="20" height="20" aria-hidden="true">
          <path d="M19 10h7v2h-7zm0 5h7v2h-7zm0 5h7v2h-7zM6 10h7v2H6zm0 5h7v2H6zm0 5h7v2H6z"/>
          <path d="M28,2H4A2,2,0,0,0,2,4V28a2,2,0,0,0,2,2H28a2,2,0,0,0,2-2V4A2,2,0,0,0,28,2ZM15,28H4V4H15ZM28,28H17V4H28Z"/>
        </svg>
      </button>
      <button id="nav-admin" class="nr-rail-item" type="button"
              title="Admin" aria-label="Admin">
        <!-- Icon is set by JS on init (see index.ts) -->
      </button>
      <button id="nav-theme" class="nr-rail-item nr-rail-item--bottom" type="button"
              title="Switch to dark mode" aria-label="Switch to dark mode">
        <!-- Icon is set by JS on init; placeholder keeps the button sized correctly -->
      </button>
    </nav>
    <div id="palette"></div>
    <div id="design-name"></div>
    <div id="resource-bar"></div>
    <div id="layout-bar"></div>
    <div id="canvas"></div>
    <div id="view-toggle-container"></div>
    <div id="workload-table"></div>
    <div id="minimap"></div>
    <div id="zoom-control"></div>
    <div id="inspector"></div>
    <div id="component-designer" aria-hidden="true">
      <div id="cd2-palette"></div>
      <div id="cd2-canvas-wrap">
        <div class="cd2-view-pane">
          <span class="cd2-pane-label">2D</span>
          <div id="cd2-canvas-2d"></div>
        </div>
        <div class="cd2-view-pane">
          <span class="cd2-pane-label">Isometric</span>
          <div id="cd2-canvas"></div>
        </div>
      </div>
      <div id="cd2-view-toggle-container"></div>
      <div id="cd2-layers"></div>
      <div id="cd2-inspector"></div>
    </div>
    <div id="app-designer" aria-hidden="true">
      <div id="ad-palette"></div>
      <div id="ad-canvas-wrap">
        <div class="ad-view-pane">
          <span class="ad-pane-label">Isometric</span>
          <div id="ad-canvas"></div>
        </div>
      </div>
      <div id="ad-inspector"></div>
    </div>
    <div id="product-catalog" aria-hidden="true"></div>
    <div id="data-model" aria-hidden="true"></div>
    <div id="knowledge-base" aria-hidden="true"></div>
    <div id="admin" aria-hidden="true"></div>

    <script src="dist/bundle.js"></script>
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loader = document.getElementById('app-loader');
          if (loader) {
            loader.classList.add('fade-out');
            setTimeout(function() { loader.remove(); }, 500);
          }
        }, 300);
      });
    </script>
  </body>
</html>
