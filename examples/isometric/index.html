<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="The JointJS Isometric demo serves as a template to help bring your idea to life in no time."/>
    <title>Isometric Diagram | JointJS</title>
  </head>
  <body>
    <nav id="nav-rail" aria-label="Application navigation">
      <button id="nav-grid" class="nr-rail-item nr-rail-item--active" type="button"
              title="System Designer" aria-label="System Designer" aria-current="page">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
             width="20" height="20" aria-hidden="true">
          <path d="M1 1h8v8H1V1zm10 0h8v8h-8V1zM1 11h8v8H1v-8zm10 0h8v8h-8v-8z"/>
        </svg>
      </button>
      <button id="nav-shapes" class="nr-rail-item" type="button"
              title="Component Designer" aria-label="Component Designer">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
             width="20" height="20" aria-hidden="true">
          <path d="M10 1L19 10 10 19 1 10z"/>
        </svg>
      </button>
    </nav>
    <div id="palette"></div>
    <div id="design-name"></div>
    <div id="canvas"></div>
    <button id="toggle">Toggle 2D / Isometric View</button>
    <div id="inspector"></div>
    <div id="component-designer" aria-hidden="true">
      <!-- Left sidebar: Section 2 (Icon) + Section 3 (Base Shape) -->
      <aside id="cd-sidebar">
        <section class="cd-section">
          <p class="cd-section-title">Icon</p>
          <div id="cd-icon-grid"></div>
        </section>
        <section class="cd-section">
          <p class="cd-section-title">Base Shape</p>
          <div id="cd-shape-grid">
            <button class="cd-shape-btn cd-shape-btn--active" data-shape="square" type="button">Square</button>
            <button class="cd-shape-btn" data-shape="rectangle" type="button">Rectangle</button>
            <button class="cd-shape-btn" data-shape="round" type="button">Round</button>
            <button class="cd-shape-btn" data-shape="octagon" type="button">Octagon</button>
          </div>
        </section>
      </aside>
      <!-- Right area: Section 1 (Preview) -->
      <div id="cd-preview-area">
        <p class="cd-section-title">Preview</p>
        <div id="cd-preview-wrap">
          <svg id="cd-preview-svg" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
      </div>
    </div>
    <a rel="noopener" target="_blank" href="https://www.jointjs.com">
      <img alt="JointJS logo" id="logo" src="assets/jj-logo.svg" width="200" height="50"></img>
    </a>
    <script src="dist/bundle.js"></script>
  </body>
</html>
